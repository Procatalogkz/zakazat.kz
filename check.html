<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏖️ Список на пляж</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(180deg,#5ec8ff,#dff8ff);
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
    font-size:30px;
}

.progressBox{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.progress{
    width:100%;
    height:15px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.progressFill{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:.3s;
}

.category{
    background:white;
    border-radius:18px;
    margin-bottom:18px;
    overflow:hidden;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.category h2{
    background:#0099ff;
    color:white;
    padding:14px;
    font-size:20px;
}

.item{
    display:flex;
    align-items:center;
    padding:14px;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border:none;
}

.item input{
    width:24px;
    height:24px;
    margin-right:15px;
}

.item label{
    font-size:18px;
    flex:1;
}

input:checked+label{
    text-decoration:line-through;
    color:#999;
}

button{
    width:100%;
    border:none;
    background:#ff5757;
    color:white;
    font-size:18px;
    padding:16px;
    border-radius:18px;
    margin-top:20px;
}

button:active{
    transform:scale(.98);
}

.footer{
    text-align:center;
    color:white;
    margin-top:25px;
    opacity:.8;
}

@media(max-width:600px){
h1{
font-size:26px;
}
.category h2{
font-size:18px;
}
.item label{
font-size:17px;
}
}
</style>

</head>
<body>

<div class="container">

<h1>🏖️ Едем на пляж</h1>

<div class="progressBox">
<b>Готовность:</b>
<div id="counter">0 из 0</div>

<div class="progress">
<div class="progressFill" id="fill"></div>
</div>
</div>

<div id="list"></div>

<button onclick="resetChecks()">♻️ Сбросить все</button>

<div class="footer">
Приятного отдыха ☀️
</div>

</div>

<script>

const data={

"🍖 Еда":[
"Шашлык",
"Сушняк",
"Салаты",
"Хлеб",
"Пицца",
"Овощи",
"Фрукты",
"Соусы",
"Соль",
"Перец"
],

"🥤 Напитки":[
"Вода",
"Сок",
"Газировка",
"Лед"
],

"🍴 Посуда":[
"Салфетки",
"Стаканчики",
"Тарелки",
"Вилки",
"Ложки",
"Нож",
"Разделочная доска",
"Мешки для мусора"
],

"🔥 Для шашлыка":[
"Мангал",
"Шампуры",
"Решетка",
"Уголь",
"Розжиг",
"Спички/Зажигалка",
"Щипцы"
],

"🏖️ Отдых":[
"Пледы",
"Полотенца",
"Купальник/Плавки",
"Сменная одежда",
"Тапочки",
"Зонт",
"Мяч",
"Надувной круг"
],

"☀️ Защита":[
"Крем от солнца",
"Кепка/Панама",
"Очки",
"Средство от комаров"
],

"📱 Прочее":[
"Пауэрбанк",
"Кабель",
"Колонка",
"Аптечка",
"Влажные салфетки",
"Туалетная бумага"
]

};

const list=document.getElementById("list");

let index=0;

for(let category in data){

let block=document.createElement("div");
block.className="category";

block.innerHTML=`<h2>${category}</h2>`;

data[category].forEach(item=>{

let checked=localStorage.getItem(item)=="1"?"checked":"";

block.innerHTML+=`
<div class="item">
<input ${checked} id="i${index}" type="checkbox" onchange="save(this,'${item}')">
<label for="i${index}">${item}</label>
</div>
`;

index++;

});

list.appendChild(block);

}

function save(el,key){
localStorage.setItem(key,el.checked?1:0);
update();
}

function update(){

let all=document.querySelectorAll("input");

let checked=document.querySelectorAll("input:checked");

document.getElementById("counter").innerHTML=
checked.length+" из "+all.length;

document.getElementById("fill").style.width=
checked.length/all.length*100+"%";

}

function resetChecks(){

if(!confirm("Сбросить все отметки?")) return;

document.querySelectorAll("input").forEach(i=>{
i.checked=false;
});

localStorage.clear();

update();

}

update();

</script>

</body>
</html>
